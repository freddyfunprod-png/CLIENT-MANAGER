services:
  - type: web
    name: client-manager
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
# Nota: para persistencia de la DB en plan free, usar el endpoint /api/backup/import
# después de cada redeploy. Plan "starter" ($7/mes) permite agregar disk:
#   disk:
#     name: crm-data
#     mountPath: /app/data
#     sizeGB: 1
