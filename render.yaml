services:
  - type: web
    name: client-manager
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
# Nota: para persistencia de la DB en plan free, usar el endpoint /api/backup/import
# después de cada redeploy. Plan "starter" ($7/mes) permite agregar disk:
#   disk:
#     name: crm-data
#     mountPath: /app/data
#     sizeGB: 1
